    <path d="M226,90 h60 v34 a30,26 0 0 1 -60,0 z" opacity="0.97" />
    <line x1="336" y1="86" x2="352" y2="128" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
    <circle cx="354" cy="136" r="7" />
  </g>

  <!-- sparkle accent -->
  <polygon points="392,150 399,166 416,172 399,178 392,194 385,178 368,172 385,166" fill="#facc15" />

  <!-- open book -->
