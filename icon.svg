      <stop offset="0" stop-color="#6366f1" />
      <stop offset="0.55" stop-color="#818cf8" />
      <stop offset="1" stop-color="#22d3ee" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />

  <!-- graduation cap -->
  <g fill="#ffffff">
