    <rect x="262" y="140" width="100" height="164" rx="9" opacity="0.97" />
    <rect x="250" y="140" width="12" height="164" opacity="0.55" />
  </g>
  <g stroke="#6366f1" stroke-width="7" stroke-linecap="round" opacity="0.5">
    <line x1="168" y1="176" x2="220" y2="176" />
    <line x1="168" y1="204" x2="220" y2="204" />
    <line x1="168" y1="232" x2="220" y2="232" />
    <line x1="292" y1="176" x2="344" y2="176" />
    <line x1="292" y1="204" x2="344" y2="204" />
    <line x1="292" y1="232" x2="344" y2="232" />
  </g>

  <!-- text -->
  <text x="256" y="372" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="1" textLength="260" lengthAdjust="spacingAndGlyphs">Kelime</text>
  <text x="256" y="434" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff" letter-spacing="1" textLength="360" lengthAdjust="spacingAndGlyphs">Ezberleme</text>
